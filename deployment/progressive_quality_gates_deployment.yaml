# Progressive Quality Gates - Production Deployment Configuration
# Kubernetes deployment manifest for autonomous SDLC system

apiVersion: v1
kind: Namespace
metadata:
  name: progressive-quality-gates
  labels:
    app.kubernetes.io/name: progressive-quality-gates
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: autonomous-sdlc
    terragon.ai/system: progressive-quality-gates

---
# ConfigMap for Progressive Quality Gates Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: progressive-quality-gates-config
  namespace: progressive-quality-gates
data:
  quality_gates_config.yaml: |
    progressive_quality_gates:
      initial_level: "bootstrap"
      optimization_frequency: 30
      learning_rate: 0.1
      confidence_threshold: 0.8
      dimensions:
        - coverage
        - performance  
        - security
        - reliability
        - maintainability
        - user_experience
        - scalability
        - research_impact
      
    autonomous_sdlc:
      automation_level: "autonomous"
      max_concurrent_tasks: 5
      task_timeout: 300
      retry_limit: 3
      
    adaptive_resilience:
      circuit_breaker_threshold: 5
      recovery_timeout: 60
      chaos_testing_enabled: true
      
    deployment_orchestrator:
      risk_tolerance: 0.3
      blue_green_enabled: true
      canary_percentage: 0.05
      
    hyperscale_performance:
      quantum_coherence_enabled: true
      neural_adaptation_enabled: true
      optimization_dimensions: 10

---
# Secret for sensitive configuration
apiVersion: v1
kind: Secret
metadata:
  name: progressive-quality-gates-secrets
  namespace: progressive-quality-gates
type: Opaque
data:
  # Base64 encoded values - replace with actual secrets
  database_url: cG9zdGdyZXNxbDovL3VzZXI6cGFzc0Bsb2NhbGhvc3Q6NTQzMi9kYg==
  openai_api_key: c2stWW91ck9wZW5BSUtleUhlcmU=
  monitoring_token: bW9uaXRvcmluZ190b2tlbl9oZXJl

---
# Service Account with appropriate permissions
apiVersion: v1
kind: ServiceAccount
metadata:
  name: progressive-quality-gates-sa
  namespace: progressive-quality-gates

---
# Role for namespace-level permissions
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: progressive-quality-gates-role
  namespace: progressive-quality-gates
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps", "secrets"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]
- apiGroups: ["extensions", "networking.k8s.io"]
  resources: ["ingresses"]
  verbs: ["get", "list", "watch"]

---
# RoleBinding to link ServiceAccount and Role
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: progressive-quality-gates-rolebinding
  namespace: progressive-quality-gates
subjects:
- kind: ServiceAccount
  name: progressive-quality-gates-sa
  namespace: progressive-quality-gates
roleRef:
  kind: Role
  name: progressive-quality-gates-role
  apiGroup: rbac.authorization.k8s.io

---
# Main Application Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: progressive-quality-gates-app
  namespace: progressive-quality-gates
  labels:
    app.kubernetes.io/name: progressive-quality-gates
    app.kubernetes.io/component: main-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: progressive-quality-gates
      app.kubernetes.io/component: main-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: progressive-quality-gates
        app.kubernetes.io/component: main-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: progressive-quality-gates-sa
      containers:
      - name: progressive-quality-gates
        image: sql-synth-agentic-playground:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8501
          name: streamlit
          protocol: TCP
        - containerPort: 8080  
          name: metrics
          protocol: TCP
        - containerPort: 8090
          name: health
          protocol: TCP
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: LOG_LEVEL
          value: "INFO"
        - name: PROGRESSIVE_QUALITY_GATES_ENABLED
          value: "true"
        - name: AUTONOMOUS_SDLC_ENABLED
          value: "true"
        - name: HYPERSCALE_PERFORMANCE_ENABLED
          value: "true"
        envFrom:
        - configMapRef:
            name: progressive-quality-gates-config
        - secretRef:
            name: progressive-quality-gates-secrets
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 2000m
            memory: 4Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 8090
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8090
          initialDelaySeconds: 15
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        volumeMounts:
        - name: config-volume
          mountPath: /app/config
        - name: logs-volume
          mountPath: /app/logs
        - name: cache-volume
          mountPath: /app/cache
      volumes:
      - name: config-volume
        configMap:
          name: progressive-quality-gates-config
      - name: logs-volume
        emptyDir: {}
      - name: cache-volume
        emptyDir:
          sizeLimit: 1Gi

---
# Autonomous SDLC Orchestrator Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: autonomous-sdlc-orchestrator
  namespace: progressive-quality-gates
  labels:
    app.kubernetes.io/name: progressive-quality-gates
    app.kubernetes.io/component: sdlc-orchestrator
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: progressive-quality-gates
      app.kubernetes.io/component: sdlc-orchestrator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: progressive-quality-gates
        app.kubernetes.io/component: sdlc-orchestrator
    spec:
      serviceAccountName: progressive-quality-gates-sa
      containers:
      - name: sdlc-orchestrator
        image: sql-synth-agentic-playground:latest
        command: ["python3", "-m", "src.sql_synth.autonomous_sdlc_orchestrator"]
        resources:
          requests:
            cpu: 300m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 2Gi
        env:
        - name: COMPONENT
          value: "sdlc-orchestrator"
        - name: WORKSPACE_PATH
          value: "/app"
        envFrom:
        - configMapRef:
            name: progressive-quality-gates-config
        - secretRef:
            name: progressive-quality-gates-secrets

---
# Hyperscale Performance Nexus Deployment  
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hyperscale-performance-nexus
  namespace: progressive-quality-gates
  labels:
    app.kubernetes.io/name: progressive-quality-gates
    app.kubernetes.io/component: performance-nexus
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: progressive-quality-gates
      app.kubernetes.io/component: performance-nexus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: progressive-quality-gates
        app.kubernetes.io/component: performance-nexus
    spec:
      serviceAccountName: progressive-quality-gates-sa
      containers:
      - name: performance-nexus
        image: sql-synth-agentic-playground:latest
        command: ["python3", "-m", "src.sql_synth.hyperscale_performance_nexus"]
        resources:
          requests:
            cpu: 1000m
            memory: 2Gi
          limits:
            cpu: 4000m
            memory: 8Gi
        env:
        - name: COMPONENT
          value: "performance-nexus"
        - name: QUANTUM_OPTIMIZATION_ENABLED
          value: "true"
        envFrom:
        - configMapRef:
            name: progressive-quality-gates-config
        - secretRef:
            name: progressive-quality-gates-secrets

---
# Service for Main Application
apiVersion: v1
kind: Service
metadata:
  name: progressive-quality-gates-service
  namespace: progressive-quality-gates
  labels:
    app.kubernetes.io/name: progressive-quality-gates
    app.kubernetes.io/component: main-app
spec:
  type: ClusterIP
  ports:
  - port: 8501
    targetPort: streamlit
    protocol: TCP
    name: streamlit
  - port: 8080
    targetPort: metrics
    protocol: TCP
    name: metrics
  - port: 8090
    targetPort: health
    protocol: TCP
    name: health
  selector:
    app.kubernetes.io/name: progressive-quality-gates
    app.kubernetes.io/component: main-app

---
# Ingress for External Access
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: progressive-quality-gates-ingress
  namespace: progressive-quality-gates
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  tls:
  - hosts:
    - progressive-quality-gates.example.com
    secretName: progressive-quality-gates-tls
  rules:
  - host: progressive-quality-gates.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: progressive-quality-gates-service
            port:
              number: 8501
      - path: /metrics
        pathType: Prefix
        backend:
          service:
            name: progressive-quality-gates-service
            port:
              number: 8080
      - path: /health
        pathType: Prefix
        backend:
          service:
            name: progressive-quality-gates-service
            port:
              number: 8090

---
# ServiceMonitor for Prometheus monitoring
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: progressive-quality-gates-monitor
  namespace: progressive-quality-gates
  labels:
    app.kubernetes.io/name: progressive-quality-gates
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: progressive-quality-gates
      app.kubernetes.io/component: main-app
  endpoints:
  - port: metrics
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s

---
# HorizontalPodAutoscaler for auto-scaling
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: progressive-quality-gates-hpa
  namespace: progressive-quality-gates
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: progressive-quality-gates-app
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60

---
# PodDisruptionBudget for high availability
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: progressive-quality-gates-pdb
  namespace: progressive-quality-gates
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: progressive-quality-gates
      app.kubernetes.io/component: main-app

---
# NetworkPolicy for security
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: progressive-quality-gates-netpol
  namespace: progressive-quality-gates
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: progressive-quality-gates
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 8501
    - protocol: TCP
      port: 8080
    - protocol: TCP
      port: 8090
  egress:
  - {}  # Allow all egress traffic for external API calls